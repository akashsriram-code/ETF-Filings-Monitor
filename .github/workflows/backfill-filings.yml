name: Backfill SEC Filings

on:
  workflow_dispatch:
    inputs:
      backfill_days:
        description: "Number of days to backfill from SEC daily master index"
        required: true
        default: "7"

concurrency:
  group: filings-data-main
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  backfill:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Backfill filings
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}
          REPORTER_EMAIL: ${{ secrets.REPORTER_EMAIL }}
          SMTP_HOST: smtp.gmail.com
          SMTP_PORT: "587"
          SMTP_USE_TLS: "true"
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          FROM_EMAIL: ${{ secrets.FROM_EMAIL }}
          OPENARENA_BASE_URL: https://aiopenarena.thomsonreuters.com
          OPENARENA_BEARER_TOKEN: ${{ secrets.OPENARENA_BEARER_TOKEN || vars.OPENARENA_BEARER_TOKEN }}
          OPENARENA_WORKFLOW_ID: ${{ secrets.OPENARENA_WORKFLOW_ID || vars.OPENARENA_WORKFLOW_ID }}
          OPENARENA_TIMEOUT_SECONDS: "60"
        run: |
          test -n "$OPENARENA_BEARER_TOKEN" || (echo "Missing OPENARENA_BEARER_TOKEN (set repo Secret or Variable)." && exit 1)
          test -n "$OPENARENA_WORKFLOW_ID" || (echo "Missing OPENARENA_WORKFLOW_ID (set repo Secret or Variable)." && exit 1)
          python scripts/poll_filings.py --backfill-days "${{ github.event.inputs.backfill_days }}"

      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain data)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/alerts.json data/state.json data/status.json
            git commit -m "chore: backfill filing alerts data"
            git fetch origin main
            git rebase origin/main
            git push origin HEAD:main
          fi
